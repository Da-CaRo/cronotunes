    <style>
        /* 1. DEFINICIÓN DE VARIABLES DE COLOR */
        :root {
            --color-acento: #b83fc0;
            /* Turquesa vibrante */
            --color-fondo: #0f172a;
            /* Un azul pizarra muy oscuro (slate-900) */
            --color-tarjeta: #1e293b;
            /* Un tono más claro para las tarjetas (slate-800) */
            --color-texto: #f8fafc;
            /* Blanco azulado muy limpio */
            --color-texto-tarjeta: #94a3b8;
            /* Gris suave para descripciones */
            --color-borde-tarjeta: #334155;
            /* Bordes sutiles */
        }

        /* 2. APLICACIÓN DE VARIABLES A LOS ESTILOS GLOBALMENTE */
        body {
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
            background-color: var(--color-fondo);
            /* Usando variable */
            color: var(--color-texto);
            /* Usando variable */
        }

        /* Para usar una fuente monoespaciada en títulos específicos */
        .font-code {
            font-family: 'Space Mono', ui-monospace, SFMono-Regular, monospace;
        }

        .font-cronotunes {
            font-family: 'Monoton', cursive;
            line-height: 1;
            word-wrap: break-word;
            overflow-wrap: break-word;
            max-width: 100%;
            text-shadow: 0 0 3px #e8e063;
        }

        /* Sobrescribir las clases de Tailwind con las variables (para el color de acento) */
        .text-acento {
            color: var(--color-acento);
        }

        .hover-acento:hover {
            color: var(--color-acento);
        }

        .bg-tarjeta {
            background-color: var(--color-tarjeta);
        }

        .border-tarjeta {
            border-color: var(--color-borde-tarjeta);
        }

        .border-tarjeta:hover {
            border-color: var(--color-acento);
        }

        .text-tarjeta {
            color: var(--color-texto-tarjeta);
        }

        .item-glow {
            filter: drop-shadow(0 0 8px var(--color-acento));
        }

        .card {
            width: 120px;
            height: 160px;
            background-color: var(--color-tarjeta);
            border: 2px solid var(--color-borde-tarjeta);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: grab;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .card.dragging {
            opacity: 0.5;
            border-color: var(--color-acento);
        }

        .card-revealed {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            height: 100%;
            padding: 8px;
            background: linear-gradient(145deg, var(--color-tarjeta), #2d3a4f);
            border-radius: 10px;
            border: 1px solid var(--color-acento);
            box-shadow: 0 0 15px rgba(255, 46, 99, 0.2);
        }

        .card-year {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            color: var(--color-acento);
            font-weight: 900;
        }

        .card-title {
            font-size: 0.7rem;
            color: white;
            margin-top: 4px;
            font-weight: bold;
            line-height: 1.1;
        }

        .card-artist {
            font-size: 0.6rem;
            color: var(--color-texto-gris);
            text-transform: uppercase;
            margin-top: 2px;
        }

        .card-song-info {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: white;
            margin-top: 5px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 5px;
        }

        .card-unknown {
            font-size: 3rem;
            color: var(--color-texto-gris);
            opacity: 0.4;
        }

        .card.pending {
            border: 2px solid #fbbf24;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.2);
        }

        #spotify-container {
            background-color: var(--color-tarjeta);
            border-color: var(--color-borde-tarjeta);
            transition: all 0.5s ease-in-out;
        }

        /* Animación de entrada para el reproductor */
        #spotify-container:not(.hidden) {
            animation: slideIn 0.4s ease-out;
        }

        #spotify-player-dj:empty {
            display: none;
        }
    </style>
</head>

    <script type="module">
        document.getElementById('currentYearFooter').textContent = new Date().getFullYear();

        // Base de datos de canciones
        import { musicDatabase } from './data/canciones.js';

        // Función global para cambiar de vista
        window.switchMode = function (mode) {
            document.getElementById('start-buttons').classList.add('hidden');
            document.getElementById('view-dj').classList.add('hidden');
            document.getElementById('view-player').classList.add('hidden');

            // Referencias para limpiar el reproductor
            const playerWrapperDj = document.getElementById('player-wrapper-dj');
            const playerDivDj = document.getElementById('spotify-player-dj');
            const displayIdDj = document.getElementById('display-id-dj');
            const displayYearDj = document.getElementById('display-year-dj');

            if (mode === 'selection') {
                document.getElementById('start-buttons').classList.remove('hidden');
                // Al volver al menú, eliminamos el iframe para que pare la música
                playerDivDj.innerHTML = '';
                displayIdDj.textContent = '--';
                displayYearDj.textContent = '--';
            }
            else if (mode === 'dj') {
                document.getElementById('view-dj').classList.remove('hidden');
                // Al entrar al modo DJ, nos aseguramos de que el reproductor esté vacío hasta pulsar el botón
                playerDivDj.innerHTML = '';
                displayIdDj.textContent = '--';
                displayYearDj.textContent = '--';
            }
            else if (mode === 'player') {
                document.getElementById('view-player').classList.remove('hidden');
            }
        }

        // =========================================================
        // INICIO: DOMContentLoaded
        // =========================================================
        document.addEventListener('DOMContentLoaded', () => {
            // 1. REFERENCIAS DEL DOM
            const timeline = document.getElementById('timeline');
            const newCardArea = document.getElementById('new-card-area');
            const btnConfirm = document.getElementById('btn-confirm');
            const btnDrawPlayer = document.getElementById('btn-draw-player');
            const btnDrawDj = document.getElementById('btn-draw-dj');
            const displayIdDj = document.getElementById('display-id-dj');
            const displayYearDj = document.getElementById('display-year-dj');
            const playerDivDj = document.getElementById('spotify-player-dj');
            const playerWrapperDj = document.getElementById('player-wrapper-dj');
            const btnBackPlayer = document.getElementById('btn-back-player');
            const clearBtn = document.getElementById('clear-storage-btn');

            let currentPendingCard = null;


            // ==========================================
            // NUEVO: FUNCIONES DE PERSISTENCIA
            // ==========================================
            // 2. FUNCIONES DE PERSISTENCIA (LOCALSTORAGE)

            // Guarda el orden de los IDs en el LocalStorage
            function saveGameState() {
                const revealedCards = [...timeline.querySelectorAll('.card:not(.pending)')];
                const state = revealedCards.map(card => card.dataset.songId);
                localStorage.setItem('cronotunes_save', JSON.stringify(state));
            }

            // Carga y reconstruye el tablero
            function loadGameState() {
                const savedData = localStorage.getItem('cronotunes_save');
                if (!savedData) return;
                const ids = JSON.parse(savedData);
                ids.forEach(id => {
                    const songData = musicDatabase.find(s => s.id === id);
                    if (songData) {
                        timeline.appendChild(createCard(songData, true));
                    }
                });
            }

            clearBtn.addEventListener('click', () => {
                // Confirmación para evitar accidentes
                if (confirm("¿Estás seguro de que quieres borrar todo el progreso y las variables guardadas?")) {

                    // 1. Borrar el LocalStorage
                    Object.keys(localStorage).forEach(key => {
                        if (key.startsWith('cronotunes_')) localStorage.removeItem(key);
                    });

                    // 2. Limpiar el tablero visualmente (opcional si vas a recargar)
                    const timeline = document.getElementById('timeline');
                    if (timeline) timeline.innerHTML = '';

                    // 3. Forzar recarga de la página para resetear variables en memoria
                    window.location.reload();
                }
            });


            // 3. FUNCIONES DE CARTAS
            function createCard(song, isRevealed) {
                const card = document.createElement('div');
                card.className = 'card shadow-xl';
                card.dataset.year = song.year;
                card.dataset.songId = song.id;

                if (isRevealed) {
                    revealCard(card, song);
                } else {
                    card.innerHTML = `<span class="card-unknown">?</span>`;
                    card.classList.add('pending');
                    card.draggable = true;
                    card.addEventListener('dragstart', () => card.classList.add('dragging'));
                    card.addEventListener('dragend', () => card.classList.remove('dragging'));
                }
                return card;
            }

            function revealCard(card, song) {
                card.classList.remove('pending');
                card.draggable = false;
                card.dataset.songId = song.id;
                card.innerHTML = `
            <div class="card-revealed">
                <span class="card-year">${song.year}</span>
                <span class="card-title">${song.title}</span>
                <span class="card-artist">${song.artist}</span>
            </div>`;
            }

            // 4. LÓGICA MODO JUGADOR
            btnDrawPlayer.addEventListener('click', () => {
                if (currentPendingCard) return;

                if (timeline.children.length === 0) {
                    const firstSong = musicDatabase[Math.floor(Math.random() * musicDatabase.length)];
                    timeline.appendChild(createCard(firstSong, true));
                    saveGameState();
                } else {
                    const card = createCard({}, false);
                    newCardArea.appendChild(card);
                    currentPendingCard = card;
                    btnConfirm.classList.remove('hidden');
                }
            });

            btnConfirm.addEventListener('click', () => {
                // VALIDACIÓN: ¿Está la tarjeta dentro del timeline?
                // Comprobamos si el padre de la tarjeta pendiente es el elemento 'timeline'
                if (currentPendingCard.parentElement !== timeline) {
                    alert("Primero debes arrastrar la tarjeta a una posición en la línea de tiempo.");
                    return; // Detiene la ejecución si no está en el timeline
                }

                const gameId = prompt("Introduce el ID de la canción:");
                const songData = musicDatabase.find(s => s.id == gameId.toString());

                if (!songData) {
                    alert("ID de juego no encontrado.");
                    return;
                }

                currentPendingCard.dataset.year = songData.year;
                currentPendingCard.dataset.songId = songData.id;

                const allCards = [...timeline.querySelectorAll('.card')];
                const years = allCards.map(c => parseInt(c.dataset.year));
                const isCorrect = years.every((val, i, arr) => !i || arr[i - 1] <= val);

                if (isCorrect) {
                    revealCard(currentPendingCard, songData);
                    saveGameState();
                    alert("✅ ¡Correcto!");
                } else {
                    alert(`❌ ¡Error! La canción era de ${songData.year}.`);
                    currentPendingCard.remove();
                }

                currentPendingCard = null;
                btnConfirm.classList.add('hidden');
            });

            btnBackPlayer.addEventListener('click', () => {
                // 1. Mostrar alerta de confirmación
                const confirmExit = confirm("¿Estás seguro de que quieres volver al menú? Se borrará todo el progreso de tu tablero actual.");

                if (confirmExit) {
                    // 2. Borrar el progreso en LocalStorage
                    localStorage.removeItem('cronotunes_save');

                    // 3. Limpiar el tablero visualmente
                    const timeline = document.getElementById('timeline');
                    const newCardArea = document.getElementById('new-card-area');
                    const btnConfirm = document.getElementById('btn-confirm');

                    timeline.innerHTML = '';
                    newCardArea.innerHTML = '';

                    // 4. Resetear variables de estado
                    currentPendingCard = null;
                    btnConfirm.classList.add('hidden');

                    // 5. Volver a la pantalla de selección (Llamamos a tu función de cambio de modo)
                    switchMode('selection');
                }
            });

            // 5. LÓGICA MODO DJ
            const playlistSelector = document.getElementById('playlist-selector');
            let selectedPlaylist = 'all';

            // Actualizar la playlist cuando el usuario cambie el selector
            playlistSelector.addEventListener('change', (e) => {
                selectedPlaylist = e.target.value;
            });

            btnDrawDj.addEventListener('click', () => {
                // 1. Obtener la lista de IDs ya usados del localStorage
                let usedIds = JSON.parse(localStorage.getItem('cronotunes_used_songs')) || [];

                // 1. FILTRAR POR PLAYLIST PRIMERO
                let pool = musicDatabase;
                if (selectedPlaylist !== 'all') {
                    pool = musicDatabase.filter(song => song.playlists && song.playlists.includes(selectedPlaylist));
                }

                // 2. Filtrar la base de datos para obtener SOLO las que no se han usado
                const availableSongs = pool.filter(song => !usedIds.includes(song.id));

                // 3. Si no quedan canciones, avisar y resetear
                if (availableSongs.length === 0) {
                    alert(`¡Se han terminado las canciones de la playlist: ${selectedPlaylist} Reiniciando historial de esta lista...`);

                    // Limpiamos solo los IDs que pertenecen a esta playlist para no borrar el historial de otras
                    const poolIds = pool.map(s => s.id);
                    usedIds = usedIds.filter(id => !poolIds.includes(id));

                    localStorage.setItem('cronotunes_used_songs', JSON.stringify(usedIds));

                    // Ahora las disponibles son todas las de la playlist seleccionada
                    availableSongs = pool;
                }

                // 4. Elegir una canción aleatoria de las DISPONIBLES
                const randomSong = availableSongs[Math.floor(Math.random() * availableSongs.length)];

                console.log(randomSong)

                // 5. REGISTRAR EL ID: Guardamos el ID de la canción que acabamos de elegir
                usedIds.push(randomSong.id);
                localStorage.setItem('cronotunes_used_songs', JSON.stringify(usedIds));

                // 6. ACTUALIZAR LA INTERFAZ
                // Mostramos el ID de juego (ej: "A1")
                displayIdDj.textContent = randomSong.id;
                displayYearDj.textContent = randomSong.year;

                // Inyectamos el reproductor de la misma canción (usando su spotifyId)
                playerDivDj.innerHTML = `
        <iframe src="https://open.spotify.com/embed/track/${randomSong.spotifyId}?utm_source=generator&theme=0" 
            width="100%" height="152" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
            style="border-radius: 18px;"></iframe>`;

                playerWrapperDj.classList.remove('opacity-0', 'translate-y-4');
                playerWrapperDj.classList.add('opacity-100', 'translate-y-0');

                btnDrawDj.textContent = "Siguiente Canción ⏭️";
            });



            // 6. DRAG & DROP Y CARGA INICIAL
            timeline.addEventListener('dragover', e => {
                e.preventDefault();
                const dragging = document.querySelector('.dragging');
                if (!dragging) return;
                const draggableElements = [...timeline.querySelectorAll('.card:not(.dragging)')];
                const afterElement = draggableElements.reduce((closest, child) => {
                    const box = child.getBoundingClientRect();
                    const offset = e.clientX - box.left - box.width / 2;
                    if (offset < 0 && offset > closest.offset) return { offset, element: child };
                    return closest;
                }, { offset: Number.NEGATIVE_INFINITY }).element;

                if (!afterElement) timeline.appendChild(dragging);
                else timeline.insertBefore(dragging, afterElement);
            });

            timeline.addEventListener('drop', () => {
                setTimeout(saveGameState, 50);
            });

            // EJECUCIÓN INICIAL
            loadGameState();
        });
    </script>
