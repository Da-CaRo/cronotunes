    <style>
        /* 1. DEFINICIÓN DE VARIABLES DE COLOR */
        :root {
            --color-acento: #1ec8c5;
            /* Turquesa vibrante */
            --color-fondo: #0f172a;
            /* Un azul pizarra muy oscuro (slate-900) */
            --color-tarjeta: #1e293b;
            /* Un tono más claro para las tarjetas (slate-800) */
            --color-texto: #f8fafc;
            /* Blanco azulado muy limpio */
            --color-texto-tarjeta: #94a3b8;
            /* Gris suave para descripciones */
            --color-borde-tarjeta: #334155;
            /* Bordes sutiles */
        }

        /* 2. APLICACIÓN DE VARIABLES A LOS ESTILOS GLOBALMENTE */
        body {
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
            background-color: var(--color-fondo);
            /* Usando variable */
            color: var(--color-texto);
            /* Usando variable */
        }

        /* Para usar una fuente monoespaciada en títulos específicos */
        .font-code {
            font-family: 'Space Mono', ui-monospace, SFMono-Regular, monospace;
        }

        .font-cronotunes {
            font-family: 'Luckiest Guy', cursive;
            line-height: 1;
            word-wrap: break-word;
            overflow-wrap: break-word;
            max-width: 100%;
        }

        /* Sobrescribir las clases de Tailwind con las variables (para el color de acento) */
        .text-acento {
            color: var(--color-acento);
        }

        .hover-acento:hover {
            color: var(--color-acento);
        }

        .bg-tarjeta {
            background-color: var(--color-tarjeta);
        }

        .border-tarjeta {
            border-color: var(--color-borde-tarjeta);
        }

        .border-tarjeta:hover {
            border-color: var(--color-acento);
        }

        .text-tarjeta {
            color: var(--color-texto-tarjeta);
        }

        .item-glow {
            filter: drop-shadow(0 0 8px var(--color-acento));
        }

        .card {
            width: 120px;
            height: 160px;
            background-color: var(--color-tarjeta);
            border: 2px solid var(--color-borde-tarjeta);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: grab;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .card.dragging {
            opacity: 0.5;
            border-color: var(--color-acento);
        }

        .card-revealed {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            height: 100%;
            padding: 8px;
            background: linear-gradient(145deg, var(--color-tarjeta), #2d3a4f);
            border-radius: 10px;
        }

        .card-year {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            color: var(--color-acento);
            font-weight: 900;
        }

        .card-title {
            font-size: 0.7rem;
            color: white;
            margin-top: 4px;
            font-weight: bold;
            line-height: 1.1;
        }

        .card-artist {
            font-size: 0.6rem;
            color: var(--color-texto-gris);
            text-transform: uppercase;
            margin-top: 2px;
        }

        .card-song-info {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: white;
            margin-top: 5px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 5px;
        }

        .card-unknown {
            font-size: 3rem;
            color: var(--color-texto-gris);
            opacity: 0.4;
        }

        .card.pending {
            border: 2px solid #fbbf24;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.2);
        }

        #spotify-container {
            background-color: var(--color-tarjeta);
            border-color: var(--color-borde-tarjeta);
            transition: all 0.5s ease-in-out;
        }

        /* Animación de entrada para el reproductor */
        #spotify-container:not(.hidden) {
            animation: slideIn 0.4s ease-out;
        }
    </style>
</head>

    <script type="module">
        document.getElementById('currentYearFooter').textContent = new Date().getFullYear();

        // =========================================================
        // INICIO: DOMContentLoaded
        // =========================================================
        // Base de datos de canciones

        const musicDatabase = [
            { id: '1', spotifyId: '4356Typ82hUiFAynbLYbPn', year: 2010, title: 'DJ Got Us Fallin In Love', artist: 'Usher' },
            { id: '2', spotifyId: '4CeeEOM32jQcH3eN9Q2dGj', year: 1991, title: 'Smells Like Teen Spirit', artist: 'Nirvana' },
            { id: '3', spotifyId: '2WfaOiMkCvy7F5fcp2zZ8L', year: 1985, title: 'Take on Me', artist: 'A-ha' },
            { id: '4', spotifyId: '40riOy7x9W7GXjyGp4pjAv', year: 1976, title: 'Hotel California', artist: 'Eagles' },
            { id: '5', spotifyId: '1zB4vmk8tFRmM9UULNzbLB', year: 2017, title: 'Thunder', artist: 'Imagine Dragons' }
        ];

        let currentPendingCard = null;

        // Función global para cambiar de vista
        window.switchMode = function (mode) {
            document.getElementById('start-buttons').classList.add('hidden');
            document.getElementById('view-dj').classList.add('hidden');
            document.getElementById('view-player').classList.add('hidden');

            if (mode === 'selection') document.getElementById('start-buttons').classList.remove('hidden');
            else if (mode === 'dj') document.getElementById('view-dj').classList.remove('hidden');
            else if (mode === 'player') document.getElementById('view-player').classList.remove('hidden');
        }

        document.addEventListener('DOMContentLoaded', () => {
            // LÓGICA MODO DJ
            const btnDrawDj = document.getElementById('btn-draw-dj');
            btnDrawDj.addEventListener('click', () => {
                const randomSong = musicDatabase[Math.floor(Math.random() * musicDatabase.length)];
                const playerDiv = document.getElementById('spotify-player-dj');
                console.log(randomSong.spotifyId)
                playerDiv.innerHTML = `<iframe src="https://open.spotify.com/embed/track/${randomSong.spotifyId}?utm_source=generator&theme=0" width="100%" height="152" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" style="border-radius: 18px;"></iframe>`;
                document.getElementById('player-wrapper-dj').classList.replace('opacity-0', 'opacity-100');
                document.getElementById('player-wrapper-dj').classList.replace('translate-y-4', 'translate-y-0');
            });

            // LÓGICA MODO JUGADOR
            const timeline = document.getElementById('timeline');
            const newCardArea = document.getElementById('new-card-area');
            const btnConfirm = document.getElementById('btn-confirm');

            // MODO JUGADOR: SACAR CARTA "?"
            document.getElementById('btn-draw-player').addEventListener('click', () => {
                if (currentPendingCard) return;

                if (timeline.children.length === 0) {
                    // Primera carta: Aleatoria y revelada para empezar el eje temporal
                    const firstSong = musicDatabase[Math.floor(Math.random() * musicDatabase.length)];
                    timeline.appendChild(createCard(firstSong, true));
                } else {
                    // Carta incógnita para colocar
                    const card = document.createElement('div');
                    card.className = 'card pending shadow-xl cursor-grab active:cursor-grabbing';
                    card.innerHTML = `<span class="card-unknown">?</span>`;
                    card.draggable = true;

                    card.addEventListener('dragstart', () => card.classList.add('dragging'));
                    card.addEventListener('dragend', () => card.classList.remove('dragging'));

                    newCardArea.appendChild(card);
                    currentPendingCard = card;
                    btnConfirm.classList.remove('hidden');
                }
            });

            // MODO JUGADOR: CONFIRMAR E INTRODUCIR ID INTERNO
            btnConfirm.addEventListener('click', () => {
                const gameId = prompt("Introduce el ID de la canción (el número que te ha dado el DJ):");

                // Buscamos en la base de datos por el ID corto ('1', '2', etc)
                const songData = musicDatabase.find(s => s.id === gameId);

                if (!songData) {
                    alert("Ese ID de juego no existe. Revisa el número.");
                    return;
                }

                // Asignamos el año a la carta temporalmente para validar
                currentPendingCard.dataset.year = songData.year;

                // Comprobamos si la posición en el DOM es cronológicamente correcta
                const allCardsInTimeline = [...timeline.querySelectorAll('.card')];
                const years = allCardsInTimeline.map(c => parseInt(c.dataset.year));

                // Verificamos si el array de años está ordenado de menor a mayor
                const isCorrectPosition = years.every((val, i, arr) => !i || arr[i - 1] <= val);

                if (isCorrectPosition) {
                    // ÉXITO: Revelamos los datos de la canción (Año, Título, Artista)
                    revealCard(currentPendingCard, songData);
                    alert(`¡Correcto! ${songData.title} es de ${songData.year}.`);
                } else {
                    // ERROR: Se elimina la carta
                    alert(`¡Error! La canción era de ${songData.year} y no va ahí.`);
                    currentPendingCard.remove();
                }

                // Limpiar estado para el siguiente turno
                currentPendingCard = null;
                btnConfirm.classList.add('hidden');
            });

            function createCard(song, isRevealed) {
                const card = document.createElement('div');
                card.className = 'card shadow-xl';
                card.dataset.year = song.year;
                if (isRevealed) revealCard(card, song);
                return card;
            }

            function revealCard(card, song) {
                card.classList.remove('pending');
                card.draggable = false;
                card.innerHTML = `
            <div class="card-revealed">
                <span class="card-year">${song.year}</span>
                <span class="card-title">${song.title}</span>
                <span class="card-artist">${song.artist}</span>
            </div>`;
            }

            // Lógica Drag & Drop (Mismo sistema de detección de posición)
            timeline.addEventListener('dragover', e => {
                e.preventDefault();
                const dragging = document.querySelector('.dragging');
                if (!dragging) return;
                const afterElement = getDragAfterElement(timeline, e.clientX);
                if (!afterElement) timeline.appendChild(dragging);
                else timeline.insertBefore(dragging, afterElement);
            });
        });

        function getDragAfterElement(container, x) {
            const draggableElements = [...container.querySelectorAll('.card:not(.dragging)')];
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = x - box.left - box.width / 2;
                if (offset < 0 && offset > closest.offset) return { offset, element: child };
                return closest;
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }
    </script>
